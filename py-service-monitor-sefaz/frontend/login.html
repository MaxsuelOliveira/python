<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | SEFAZ Control Center</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="{{ url_for('static', filename='css/styles.css') }}"
      rel="stylesheet"
    />
  </head>
  <body class="login-body">
    <main class="container py-5">
      <section class="login-shell mx-auto">
        <div class="card app-card border-0">
          <div class="card-body p-4 p-lg-5">
            <span class="eyebrow">Acesso restrito</span>
            <h1 class="hero-title mb-2">Entrar no painel</h1>
            <p class="hero-copy mb-4">
              Use as credenciais do painel antes de expor a aplicacao fora do
              ambiente local.
            </p>

            {% if error %}
            <div class="alert alert-danger" role="alert">{{ error }}</div>
            {% endif %}

            <form method="post" action="/login" class="row g-3">
              <div class="col-12">
                <label for="username" class="form-label">Usuario</label>
                <input
                  class="form-control"
                  id="username"
                  name="username"
                  required
                />
              </div>
              <div class="col-12">
                <label for="password" class="form-label">Senha</label>
                <input
                  type="password"
                  class="form-control"
                  id="password"
                  name="password"
                  required
                />
              </div>
              <div class="col-12 d-grid">
                <button class="btn btn-accent btn-lg" type="submit">
                  Entrar
                </button>
              </div>
            </form>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
