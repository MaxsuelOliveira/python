<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title></title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-gH2yIJqKdNHPEq0n4Mqa/HGKIhSkIHeL5AyhkYV8i59U5AR6csBvApHHNl/vI1Bx"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <main class="container-sm">
      <form class="needs-validation" novalidate="">
        <h4 class="mb-3">Payment</h4>

        <div class="row gy-3">
          <div class="col-md-6">
            <label for="specialization" class="form-label"
              >specialization</label
            >
            <input
              type="text"
              class="form-control"
              id="specialization"
              placeholder=""
              required=""
              value="3524024"
            />
            <div class="invalid-feedback">specialization is required</div>
          </div>

          <div class="col-md-6">
            <label for="testCode" class="form-label">testCode</label>
            <input
              type="text"
              class="form-control"
              id="testCode"
              placeholder=""
              required=""
            />
            <div class="invalid-feedback">testCode is required</div>
          </div>

          <div class="col-md-6">
            <label for="examCode" class="form-label">examCode</label>
            <input
              type="text"
              class="form-control"
              id="examCode"
              placeholder=""
              required=""
            />
            <div class="invalid-feedback">examCode is required</div>
          </div>

          <div class="col-md-6">
            <label for="semester" class="form-label">semester</label>
            <input
              type="text"
              class="form-control"
              id="semester"
              placeholder=""
              required=""
              value="2022/2"
            />
            <div class="invalid-feedback">semester is required</div>
          </div>

          <div class="col-md-6">
            <label for="subjectCode" class="form-label">subjectCode</label>
            <input
              type="text"
              class="form-control"
              id="subjectCode"
              placeholder=""
              required=""
            />
            <div class="invalid-feedback">subjectCode is required</div>
          </div>

          <div class="col-md-6">
            <label for="classCode" class="form-label">classCode</label>
            <input
              type="text"
              class="form-control"
              id="classCode"
              placeholder=""
              required=""
              value="5550ADS"
            />
            <div class="invalid-feedback">classCode is required</div>
          </div>
        </div>

        <hr class="my-4" />

        <button class="w-100 btn btn-primary btn-lg" type="submit">
          Buscar gabarito
        </button>
      </form>

      <div>
        <h4 class="my-3">Gabarito da prova.</h4>
        <div id="prova">
          <div id="subject_name"></div>
          <div id="description"></div>
          <div id="weigth"></div>
        </div>
        <div id="result"></div>
      </div>
    </main>

    <script
      src="https://code.jquery.com/jquery-3.6.0.min.js"
      integrity="sha256-/xUj+3OJU5yExlq6GSYGSHk7tPXikynS7ogEvDej/m4="
      crossorigin="anonymous"
    ></script>
    <script src="config.js"></script>
    <script src="answer-book.js"></script>
  </body>
</html>
